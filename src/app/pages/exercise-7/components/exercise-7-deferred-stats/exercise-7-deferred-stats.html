<section class="stats-panel" aria-live="polite" aria-atomic="true">
  <header class="stats-header">
    <p class="eyebrow">Bloc secondaire differe</p>
    <h3>Statistiques detaillees du produit</h3>
    <p>
      Ce composant a ete charge a la demande. Avant l interaction, son code n etait pas
      encore present dans le rendu final de la page.
    </p>
  </header>

  <div class="stats-grid">
    @for (stat of stats; track stat.label) {
      <article class="stat-card">
        <p class="stat-label">{{ stat.label }}</p>
        <p class="stat-value">{{ stat.value }}</p>
        <p class="stat-detail">{{ stat.detail }}</p>
      </article>
    }
  </div>
</section>
