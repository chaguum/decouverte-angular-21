<p-card>
  <div class="flex flex-col gap-5 sm:flex-row sm:items-start">
    <div
      class="flex h-18 w-18 shrink-0 items-center justify-center rounded-3xl bg-primary-50 text-4xl shadow-sm"
    >
      {{ member.avatar }}
    </div>

    <div class="min-w-0 space-y-3">
      <div class="space-y-2">
        <div class="flex flex-wrap items-center gap-2">
          <h3 class="text-2xl font-semibold text-surface-950">{{ member.name }}</h3>
          <p-tag [value]="member.team" severity="info" />
        </div>

        <p class="text-sm font-medium text-primary-700">{{ member.role }}</p>
        <p class="text-sm leading-6 text-surface-600">{{ member.summary }}</p>
      </div>

      <div class="inline-flex items-center gap-2 rounded-full bg-surface-100 px-3 py-2 text-sm">
        <span class="font-medium text-surface-700">Etat du jour</span>
        <span>{{ member.mood }}</span>
      </div>
    </div>
  </div>
</p-card>
